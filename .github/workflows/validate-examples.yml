name: Validate examples

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate example app packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install spec dependencies
        working-directory: spec
        run: bun install --frozen-lockfile

      - name: Test spec
        working-directory: spec
        run: bun test

      - name: Install CLI dependencies
        working-directory: src/aiappctl
        run: bun install --frozen-lockfile

      - name: Test CLI
        working-directory: src/aiappctl
        run: bun test

      - name: Validate examples
        run: |
          for app in examples/*/; do
            bun ./src/aiappctl/cli.js validate --package="$app"
          done
