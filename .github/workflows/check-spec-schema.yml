name: Check spec schema

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check generated spec schema
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install spec dependencies
        working-directory: spec
        run: bun install --frozen-lockfile

      - name: Check generated JSON Schema
        working-directory: spec
        run: bun run generate:check
